services:
  backend:
    build: 
      context: ./backend
      dockerfile: DockerFile
    container_name: backend-grade
    ports:
      - "8000:8000"
  frontend:
    build: 
      context: ./frontend
      dockerfile: DockerFile
    container_name: frontend-grade
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend